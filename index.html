<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Employee</title>

<!-- Bootstrap style sheet for the form style -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<!-- Makes table more redable -->
  <style>
    form {
      max-width: 500px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 10px;
      background: #f0f4ff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <!-- form inputs and department selecter -->
  <form id="empForm">
    <h3 class="mb-3 text-center">Employee Managment System</h3>

    <label for="id" class="form-label">Employee ID</label>
    <input type="text" id="id" class="form-control" maxlength="8" required>

    <label for="name" class="form-label mt-3">Name</label>
    <input type="text" id="name" class="form-control" required>

    <label for="ext" class="form-label mt-3">Extension</label>
    <input type="text" id="ext" class="form-control" maxlength="4" required>

    <label for="email" class="form-label mt-3">Email</label>
    <input type="email" id="email" class="form-control" required>

    <label for="department" class="form-label mt-3">Department</label>
    <select id="department" class="form-select" required>
      <option value="">Select...</option>
      <option>Administrative</option>
      <option>Engineering</option>
      <option>Executive</option>
      <option>Marketing</option>
      <option>Quality Assurance</option>
      <option>Sales</option>
    </select>

    <button type="submit" id="submit" class="btn btn-primary w-100 mt-4">
      Add Employee
    </button>
  </form>

  <script src="js/script.js"></script>
</body>
</html>
